apiVersion: apps/v1
kind: Deployment
metadata:
  name: text-analyzer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: text-analyzer
  template:
    metadata:
      labels:
        app: text-analyzer
    spec:
      containers:
      - name: text-analyzer
        image: text-analyzer:latest
        ports:
        - containerPort: 5000
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"