apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: text-analyzer-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: text-analyzer.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: text-analyzer-service
            port:
              number: 80
